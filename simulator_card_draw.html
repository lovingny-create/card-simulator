<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카드 뽑기 시뮬레이터</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            gap: 30px;
        }

        .header {
            text-align: center;
            color: white;
            z-index: 10;
            animation: fadeInDown 0.6s ease-out;
        }

        .header h1 {
            font-size: clamp(1.5em, 5vw, 2.5em);
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: clamp(0.9em, 3vw, 1.1em);
            opacity: 0.9;
        }

        .card-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 600px;
            max-height: 900px;
            perspective: 1000px;
        }

        .card-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 480px;
            max-height: 686px;
            aspect-ratio: 480 / 686;
            transform-origin: center;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-back {
            background: linear-gradient(135deg, #2c1810 0%, #8b6f47 50%, #2c1810 100%);
            border: 3px solid #d4af37;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            gap: 15px;
        }

        .card-back::before {
            content: '';
            position: absolute;
            inset: 15px;
            border: 2px solid #d4af37;
            border-radius: 8px;
        }

        .card-back-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .card-back-icon {
            font-size: clamp(2em, 10vw, 4em);
            animation: bounce 2s infinite;
        }

        .card-back-text {
            font-size: clamp(0.8em, 3vw, 1.3em);
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .card-front {
            background-image: url('output/action_0.png');
            background-size: cover;
            background-position: center;
            transform: rotateY(180deg);
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 10;
            animation: fadeInUp 0.6s ease-out;
        }

        .draw-btn {
            padding: clamp(12px, 3vw, 18px) clamp(24px, 8vw, 40px);
            font-size: clamp(1em, 4vw, 1.3em);
            font-weight: 700;
            border: none;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
            white-space: nowrap;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .draw-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
        }

        .draw-btn:active {
            transform: translateY(-1px);
        }

        .draw-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .info {
            text-align: center;
            color: white;
            font-size: clamp(0.85em, 2.5vw, 1em);
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .card-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card-info.hidden {
            opacity: 0;
            height: 0;
            padding: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 모바일/태블릿 최적화 */
        @media (max-width: 768px) {
            body {
                gap: 15px;
                padding: 15px;
            }

            .header {
                order: -1;
            }

            .card-container {
                flex: 1;
                min-height: 50vh;
            }

            .controls {
                order: 1;
            }
        }

        /* 초소형 화면 */
        @media (max-height: 600px) {
            .header {
                display: none;
            }

            body {
                gap: 10px;
            }
        }

        /* 반응형 카드 스케일 */
        .card-container.portrait {
            /* 세로 모드 */
        }

        .card-container.landscape {
            max-height: 600px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🃏 카드 뽑기</h1>
        <p>카드를 클릭하거나 버튼을 눌러 뽑아보세요</p>
    </div>

    <div class="card-container">
        <div class="card-wrapper" id="cardWrapper">
            <div class="card" id="card">
                <div class="card-face card-back">
                    <div class="card-back-content">
                        <div class="card-back-icon">🎴</div>
                        <div class="card-back-text">카드 뽑기</div>
                    </div>
                </div>
                <div class="card-face card-front" id="cardFront"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="draw-btn" id="drawBtn">🃏 카드 뽑기!</button>
        <div class="info">
            <div class="card-info hidden" id="cardInfo">
                <span id="cardLabel">액션 카드 #1</span>
            </div>
            <div class="card-info">
                <span id="totalDraws">뽑은 카드: 0장</span>
            </div>
        </div>
    </div>

    <script>
        // 카드 데이터
        const cardData = {
            action: Array.from({ length: 60 }, (_, i) => ({
                id: `action_${i}`,
                type: 'action',
                label: `액션 카드 ${i + 1}`,
                src: `output/action_${i}.png`
            })),
            wood: Array.from({ length: 13 }, (_, i) => ({
                id: `wood_${i + 1}`,
                type: 'wood',
                label: `나무 카드 ${i + 1}`,
                src: `output/wood_card_${String(i + 1).padStart(2, '0')}.png`
            }))
        };

        const allCards = [...cardData.action, ...cardData.wood];
        let totalDraws = 0;
        let currentCard = null;
        let isAnimating = false;

        const card = document.getElementById('card');
        const cardFront = document.getElementById('cardFront');
        const drawBtn = document.getElementById('drawBtn');
        const cardLabel = document.getElementById('cardLabel');
        const cardInfo = document.getElementById('cardInfo');
        const totalDrawsSpan = document.getElementById('totalDraws');
        const cardWrapper = document.getElementById('cardWrapper');

        // 반응형 스케일링
        function scaleCardToFit() {
            const container = cardWrapper;
            const card = cardWrapper.querySelector('.card');

            const maxWidth = window.innerWidth * 0.95;
            const maxHeight = window.innerHeight * 0.65;

            const cardRatio = 480 / 686;
            const containerRatio = maxWidth / maxHeight;

            let scale;
            if (containerRatio > cardRatio) {
                // 높이 제약
                scale = maxHeight / 686;
            } else {
                // 너비 제약
                scale = maxWidth / 480;
            }

            // 여유를 위해 0.9배
            scale = Math.min(scale, 1) * 0.9;

            cardWrapper.style.transform = `scale(${scale})`;
            cardWrapper.style.transformOrigin = 'center';
        }

        // 카드 뽑기
        function drawCard() {
            if (isAnimating) return;

            isAnimating = true;
            drawBtn.disabled = true;

            // 현재 카드 뒤집기
            card.classList.toggle('flipped');

            setTimeout(() => {
                // 랜덤 카드 선택
                const randomIndex = Math.floor(Math.random() * allCards.length);
                currentCard = allCards[randomIndex];

                // 카드 이미지 업데이트
                cardFront.style.backgroundImage = `url('${currentCard.src}')`;

                // 카드 정보 표시
                cardLabel.textContent = currentCard.label;
                cardInfo.classList.remove('hidden');

                // 통계 업데이트
                totalDraws++;
                totalDrawsSpan.textContent = `뽑은 카드: ${totalDraws}장`;

                isAnimating = false;
                drawBtn.disabled = false;
            }, 300);
        }

        // 카드 클릭 시에도 뽑기
        card.addEventListener('click', () => {
            if (!isAnimating && card.classList.contains('flipped')) {
                drawCard();
            }
        });

        drawBtn.addEventListener('click', drawCard);

        // 초기 카드 설정
        cardFront.style.backgroundImage = `url('output/action_0.png')`;

        // 화면 크기 변경 시 스케일 조정
        window.addEventListener('resize', scaleCardToFit);
        window.addEventListener('load', scaleCardToFit);
        window.addEventListener('orientationchange', () => {
            setTimeout(scaleCardToFit, 100);
        });

        // 초기 스케일
        scaleCardToFit();

        // 키보드 스페이스바로도 뽑기
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                drawCard();
            }
        });
    </script>
</body>
</html>
